name: CI - Lint + Build + Push Docker to GHCR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  lint:
    name: Linter (super-linter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout код
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # super-linter потребує історії

      - name: Запуск Super-Linter
        uses: super-linter/super-linter/slim@v7  # або новіша версія, якщо вийшла
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          # Вмикаємо тільки те, що нам потрібно для статичного сайту
          VALIDATE_HTML: true
          VALIDATE_CSS: true
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_MARKDOWN: true
          # Можна додати інші, якщо є (наприклад VALIDATE_JSON)

  build-and-push:
    name: Build & Push Docker image
    needs: lint                     # запускається тільки якщо лінтер пройшов
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write               # обов'язково для push в ghcr.io

    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      - name: Login до GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Визначення тегів образу
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,enable=true
            type=ref,event=branch

      - name: Build та push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
