name: CI - Lint + Build + Push Docker to GHCR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    # ... (твій lint джоб без змін)

  build-and-push:
    name: Build & Push Docker image
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      # ← Додай цей крок обов'язково!
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3   # або v4, якщо вже вийшла новіша
        with:
          driver: docker-container   # це ключовий параметр для GHA cache
          install: true

      - name: Login до GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Визначення тегів образу
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,enable=true
            type=ref,event=branch

      - name: Build та push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max